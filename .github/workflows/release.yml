name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  # NOTE: cross-platform binary archives (pulsate, p8) + SHA256 checksums are
  # produced by .github/workflows/release-binaries.yml, which also runs on the
  # `v*` tag. This workflow handles OS packages and the container image only.

  # Debian/Ubuntu .deb and RHEL/Fedora .rpm, attached to the release.
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --bin pulsate
      - run: cargo install cargo-deb cargo-generate-rpm
      - run: cargo deb -p pulsate --no-build
      - run: cargo generate-rpm -p crates/pulsate
      # Stable filenames so `releases/latest/download/...` URLs are predictable.
      - run: |
          cp target/debian/*.deb pulsate_amd64.deb
          cp target/generate-rpm/*.rpm pulsate.x86_64.rpm
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            pulsate_amd64.deb
            pulsate.x86_64.rpm

  # Multi-arch container image to GHCR.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/squaretick/pulsate
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
