# Pulsate on Kubernetes — minimal Deployment + Service.
# Gateway API / native CRD controller + EndpointSlice discovery: see docs/16-deployment.md
# (the controller is the next increment; this runs Pulsate with a mounted config).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsate
  labels: { app: pulsate }
spec:
  replicas: 2
  selector: { matchLabels: { app: pulsate } }
  template:
    metadata: { labels: { app: pulsate } }
    spec:
      containers:
        - name: pulsate
          image: ghcr.io/squaretick/pulsate:latest
          args: ["up", "/etc/pulsate/pulsate.flow", "--listen", "0.0.0.0:8080", "--metrics", "0.0.0.0:9100"]
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9100 }
          readinessProbe: { httpGet: { path: /healthz, port: http } }
          volumeMounts: [{ name: config, mountPath: /etc/pulsate }]
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "1", memory: "256Mi" }
      volumes:
        - name: config
          configMap: { name: pulsate-config }
---
apiVersion: v1
kind: Service
metadata:
  name: pulsate
spec:
  selector: { app: pulsate }
  ports:
    - { name: http, port: 80, targetPort: http }
